<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <img src="netflix-logo.svg" alt="Netflix Logo" class="logo-svg">
    </header>

    <main class="login-wrapper">
        <div class="login-content">
            <h2 class="form-title">Enter your info </h2>
            <p class="form-subtitle">Sign in Or get started with a new account.</p>
            
            <form>
                <input type="text" class="input-field" placeholder="Email or mobile number">
                <button type="button" class="btn-primary">Continue</button>
            </form>

            <a href="#" class="help-link">Get Help ></a>
            
            <p class="recaptcha-text">
                This page is protected by Google reCAPTCHA to ensure you're not a bot.
            </p>
        </div>
    </main>

    <footer class="footer">
        <p class="footer-top">Questions? Call 000-800-919-1743 (Toll-Free)</p>
        <div class="footer-links">
            <a href="#">FAQ</a>
            <a href="#">Help Centre</a>
            <a href="#">Terms of Use</a>
            <a href="#">Privacy</a>
            <a href="#">Cookie Preferences</a>
            <a href="#">Corporate Information</a>
        </div>
        <select class="language-select">
            <option>🌐 English</option>
        </select>
    </footer>
</body>
</html>
