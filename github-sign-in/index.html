<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to GitHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-content">
        <div class="login-wrapper">
            <div class="header">
                <svg height="48" aria-hidden="true" viewBox="0 0 16 16" version="1.1" width="48" fill="currentColor">
                    <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.46-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path>
                </svg>
                <h1>Sign in to GitHub</h1>
            </div>

            <div class="login-box">
                <form action="#">
                    <label for="username">Username or email address</label>
                    <input type="text" id="username" name="username">

                    <div class="password-header">
                        <label for="password">Password</label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                    <input type="password" id="password" name="password">

                    <button type="submit" class="sign-in-btn">Sign in</button>
                </form>

                <div class="divider">or</div>

                <div class="social-login">
                    <button class="social-btn">
                        <img src="../logo/google-logo.svg" alt="Google Logo" width="22" height="22" style="margin-right: 6px;">
                        <p>Continue with Google</p>
                    </button>
                    <button class="social-btn">
                        <img src="../logo/apple-logo.png" alt="Apple Logo" width="22" height="22" style="margin-right: 6px;">
                        Continue with Apple
                    </button>
                </div>
            </div>

            <div class="bottom-links-box">
                <p>New to GitHub? <a href="#">Create an account</a></p>
                <p class="passkey-link"><a href="#">Sign in with a passkey</a></p>
            </div>
        </div>
    </div>

    <div class="footer">
        <ul>
            <li><a href="#">Terms</a></li>
            <li><a href="#">Privacy</a></li>
            <li><a href="#">Docs</a></li>
            <li><a href="#">Contact GitHub Support</a></li>
            <li><a href="#">Manage cookies</a></li>
            <li><a href="#">Do not share my personal information</a></li>
        </ul>
    </div>

</body>
</html>
